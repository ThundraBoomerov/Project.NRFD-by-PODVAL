- type: entity
  name: H&K USP
  parent: [BaseWeaponPistol, BaseSecurityContraband]
  id: WeaponPistolUSP
  description: Когда-то созданный для спецподразделений, H&K USP который и сейчас не просится в отставку. Надёжный как лом, простой как лопата. Калибр .45, без глушителя — честный пистолет для честной работы.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/usp.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/usp.rsi
  - type: Item
    storedOffset: 0,-2
  - type: Gun
    fireRate: 6
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/usp_shot.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Магазин
        startingItem: MagazineMagnum
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/hpistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineMagnum
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: StaticPrice
    price: 950
